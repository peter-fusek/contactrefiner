services:
  - type: web
    name: contacts-refiner-dashboard
    runtime: node
    region: frankfurt
    plan: free
    rootDir: dashboard
    buildCommand: pnpm install && pnpm build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: GCS_SERVICE_ACCOUNT
        sync: false
      - key: GCS_BUCKET
        value: contacts-refiner-data
      - key: NUXT_SESSION_PASSWORD
        sync: false
      - key: NUXT_OAUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: NUXT_OAUTH_GOOGLE_CLIENT_SECRET
        sync: false
